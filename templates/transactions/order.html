{% extends "base.html" %}

{% block styles %}
<style>
    .order-card { background-color: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; }
    .search-results { 
        position: absolute; width: 100%; z-index: 1000; 
        background: #252525; border: 1px solid #444; display: none;
    }
    .result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
    .result-item:hover { background: #e63946; color: white; }
    .result-item.no-results:hover { 
    background: #252525; 
    color: inherit; 
    }
    .result-item.no-results .btn {
    border-width: 2px;
    }
    .table-order thead { background-color: #e63946; color: white; }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-danger"><i class="fas fa-file-invoice"></i> Create Purchase Order</h2>
        <span class="badge bg-secondary">Status: DRAFT</span>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="order-card mb-3">
                <h5>Order Header</h5>
                <div class="mb-3">
                    <label class="form-label text">Vendor / Supplier</label>
                    <input type="text" id="vendor_name" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Parts Master Inc.">
                </div>
                <div class="mb-3">
                    <label class="form-label text">Notes</label>
                    <textarea id="po_notes" class="form-control bg-dark text-white border-secondary" rows="3"></textarea>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="order-card">
                <h5>Search Items</h5>
                <div class="position-relative mb-4">
                    <input type="text" id="itemSearch" class="form-control form-control-lg bg-dark text-white border-danger" placeholder="Type item name...">
                    <div id="searchResults" class="search-results"></div>
                </div>

                <table class="table table-dark table-hover table-order">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th width="140">Stock Status</th>
                            <th width="150">Qty to Order</th>
                            <th width="150">Est. Cost</th>
                            <th width="50"></th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody">
                        <tr id="emptyRow">
                            <td colspan="5" class="text-center text-muted">No items added yet. Search above to start.</td>
                        </tr>
                    </tbody>
                </table>

                <div class="d-grid mt-4">
                    <button type="button" onclick="submitOrder()" class="btn btn-danger btn-lg">
                        <i class="fas fa-save"></i> Save Purchase Order
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/*
 * DRAFT STATE: Uses sessionStorage to preserve order items when navigating
 * away to add a new item. This is a per-tab, per-session solution.
 *
 * TODO (Option 3 migration): If the business needs cross-session draft POs
 * (e.g. start on one device, finish on another), staff collaboration on POs,
 * or manager visibility into draft POs across branches — replace this with a
 * draft_purchase_orders table in the DB. The sessionStorage key is
 * 'po_draft_items'. The DB equivalent would be a draft PO with status='DRAFT'
 * tied to the user_id. On migration, remove the sessionStorage logic below
 * and replace DOMContentLoaded restore with a fetch to load the draft from DB.
 */

const DRAFT_KEY = 'po_draft_items';
let orderItems = [];

const itemSearch = document.getElementById('itemSearch');
const searchResults = document.getElementById('searchResults');
const orderTableBody = document.getElementById('orderTableBody');

// ── On Load: Restore draft + auto-select new item if returning from items page ──
document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const prefilledId = params.get('prefilled_id');

    // Restore saved draft if it exists
    const savedDraft = sessionStorage.getItem(DRAFT_KEY);
    if (savedDraft) {
        try {
            orderItems = JSON.parse(savedDraft);
            renderTable();
        } catch (e) {
            console.error("Failed to restore draft:", e);
            orderItems = [];
        }
        sessionStorage.removeItem(DRAFT_KEY);
    }

    // Auto-select the newly created item
    if (prefilledId) {
        try {
            const response = await fetch(`/api/search?id=${prefilledId}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                addItemToOrder(data.items[0]);
            }
        } catch (err) {
            console.error("Error fetching prefilled item:", err);
        }

        // Clean the URL so a refresh doesn't re-add the item
        window.history.replaceState({}, document.title, window.location.pathname);
    }
});

// ── Search ───────────────────────────────────────────────────────
itemSearch.addEventListener('input', async (e) => {
    const query = e.target.value.trim();
    if (query.length < 2) {
        searchResults.style.display = 'none';
        return;
    }

    const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
    const data = await response.json();
    const items = data.items;

    searchResults.innerHTML = '';

    if (items && items.length > 0) {
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<strong>${item.name}</strong> 
                            <small class="text-muted">(Stock: ${item.current_stock})</small>`;
            div.onclick = () => addItemToOrder(item);
            searchResults.appendChild(div);
        });
    } else {
        // Empty state — save draft before leaving
        const div = document.createElement('div');
        div.className = 'result-item no-results d-flex justify-content-between align-items-center';
        div.innerHTML = `
            <span class="text-muted">No results for "<strong>${query}</strong>"</span>
            <a href="/transaction/items?return_to=po" 
            class="btn btn-sm btn-outline-success"
            onclick="saveDraftBeforeLeaving()">
                <i class="bi bi-plus-circle"></i> Add New Item
            </a>
        `;
        searchResults.appendChild(div);
    }

    searchResults.style.display = 'block';
});

// Close dropdown on outside click
document.addEventListener('click', (e) => {
    if (!itemSearch.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
    }
});

// ── Draft save — called before navigating away ───────────────────
function saveDraftBeforeLeaving() {
    if (orderItems.length > 0) {
        sessionStorage.setItem(DRAFT_KEY, JSON.stringify(orderItems));
    }
}

// ── Order table logic ────────────────────────────────────────────
function addItemToOrder(item) {
    if (orderItems.some(i => i.id === item.id)) {
        showOrderAlert("Item already in the list!", "warning");
        return;
    }

    orderItems.push({ 
        id: item.id, 
        name: item.name, 
        qty: 1, 
        cost: item.cost_per_piece || 0,
        current_stock: item.current_stock || 0,
        pending_stock: item.pending_stock || 0
    });
    renderTable();
    
    itemSearch.value = '';
    searchResults.style.display = 'none';
}

function renderTable() {
    if (orderItems.length === 0) {
        orderTableBody.innerHTML = `<tr id="emptyRow"><td colspan="5" class="text-center text-muted">No items added yet. Search above to start.</td></tr>`;
        return;
    }

    orderTableBody.innerHTML = '';
    orderItems.forEach((item, index) => {
        const pendingHtml = item.pending_stock > 0
            ? `<div style="color: #ffc107; font-size: 0.78rem;">+${item.pending_stock} incoming</div>`
            : `<div style="color: #666; font-size: 0.78rem;">no incoming</div>`;

        orderTableBody.innerHTML += `
            <tr>
                <td>${item.name}</td>
                <td>
                    <div style="font-size: 0.85rem;">${item.current_stock} on hand</div>
                    ${pendingHtml}
                </td>
                <td>
                    <input type="number" class="form-control form-control-sm bg-dark text-white" 
                        value="${item.qty}" min="1" onchange="updateQty(${index}, this.value)">
                </td>
                <td>
                    <input type="number" class="form-control form-control-sm bg-dark text-white" 
                        value="${item.cost}" step="0.01" onchange="updateCost(${index}, this.value)">
                </td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})">&times;</button>
                </td>
            </tr>
        `;
    });
}

function updateQty(index, val) { orderItems[index].qty = parseInt(val); }
function updateCost(index, val) { orderItems[index].cost = parseFloat(val); }
function removeItem(index) { orderItems.splice(index, 1); renderTable(); }

function showOrderAlert(message, type) {
    const icons = {
        warning: 'bi-exclamation-triangle-fill',
        danger:  'bi-x-circle-fill',
        success: 'bi-check-circle-fill',
        info:    'bi-info-circle-fill'
    };

    const container = document.getElementById('flash-container');
    const alert = document.createElement('div');
    alert.className = `alert alert-${type} shadow-lg flash-alert`;
    alert.innerHTML = `
        <div class="flash-content">
            <div class="flash-icon flash-icon-${type}">
                <i class="bi ${icons[type] || icons.info}"></i>
            </div>
            <div class="flash-text">${message}</div>
        </div>
        <div class="flash-progress"></div>
    `;

    container.appendChild(alert);
    requestAnimationFrame(() => alert.classList.add('show'));
    setTimeout(() => {
        alert.classList.remove('show');
        alert.classList.add('hide');
        setTimeout(() => alert.remove(), 350);
    }, 4000);
}

async function submitOrder() {
    if (orderItems.length === 0) { 
        showOrderAlert("Add at least one item!", "warning"); 
        return; 
    }
    
    const payload = {
        vendor_name: document.getElementById('vendor_name').value,
        notes: document.getElementById('po_notes').value,
        items: orderItems
    };

    const response = await fetch('/transaction/order/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    const result = await response.json();
    if (result.status === 'success') {
        // Clear draft on successful save — no ghost data on next PO
        sessionStorage.removeItem(DRAFT_KEY);
        window.location.href = '/transaction/orders/list';
    } else {
        showOrderAlert("Error saving order: " + result.message, "danger");
    }
}
</script>
{% endblock %}
