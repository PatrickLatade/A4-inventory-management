{% extends "base.html" %}

{% block styles %}
<style>
    .item-card {
        background-color: #1a1a1a;
        border: 1px solid #e63946;
        border-radius: 8px;
        padding: 24px;
    }

    .section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #e63946;
        margin-bottom: 12px;
        margin-top: 24px;
    }

    .hint {
        font-size: 0.75rem;
        color: #888;
    }
</style>
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="item-card shadow-sm">

        <h5 class="mb-3 text-danger">
            <i class="bi bi-plus-circle"></i> Add New Item
        </h5>

        <form method="POST" action="/items/add">

            <!-- ================= CORE INFO ================= -->
            <div class="section-title">Item Information</div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small text-white-50">Item name *</label>
                    <input type="text" name="name" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <input type="hidden" name="return_to" value="{{ return_to }}">

                <div class="col-md-3">
                    <label class="form-label small text-white-50">Category</label>
                    <select name="existing_category" id="categorySelect" class="form-control bg-dark text-white border-secondary" required>
                        <option value="">-- Select Category --</option>
                        {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                        <option value="__OTHER__">-- New Category --</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label small text-white-50">New Category Name</label>
                    <input name="new_category" id="newCategoryInput" 
                        class="form-control bg-dark text-white border-secondary"
                        placeholder="Select '-- New Category --' to type" disabled>
                </div>

                <div class="col-12">
                    <label class="form-label small text-white-50">Description</label>
                    <input type="text" name="description" class="form-control bg-dark text-white border-secondary">
                </div>

                <div class="col-md-4">
                    <label class="form-label small text-white-50">Pack size</label>
                    <input type="text" name="pack_size" class="form-control bg-dark text-white border-secondary" placeholder="e.g. 1L, Box of 12">
                </div>
            </div>

            <!-- ================= PRICING ================= -->
            <div class="section-title">Pricing & Cost</div>

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small text-white-50">Vendor price</label>
                    <input type="number" step="0.01" name="vendor_price" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label small text-white-50">Cost per piece</label>
                    <input type="number" step="0.01" name="cost_per_piece" id="cost_input" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label small text-white-50">Selling price</label>
                    <input type="number" step="0.01" name="a4s_selling_price" id="selling_input" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <div class="col-md-3">
                    <label class="form-label small text-white-50">Markup (%)</label>
                    <input type="text" id="markup_display" class="form-control bg-dark text-white border-secondary" readonly>
                    
                    <input type="hidden" name="markup" id="markup_input">
                </div>
            </div>

            <!-- ================= OPERATIONS ================= -->
            <div class="section-title">Operations</div>

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small text-white-50">Reorder level</label>
                    <input type="number" name="reorder_level" class="form-control bg-dark text-white border-secondary" value="0">
                    <div class="hint">Alert when stock drops below this</div>
                </div>
            </div>

            <!-- ================= META ================= -->
            <div class="section-title">Additional Info (Optional)</div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small text-white-50">Vendor</label>
                    <input type="text" name="vendor" class="form-control bg-dark text-white border-secondary">
                </div>

                <div class="col-md-6">
                    <label class="form-label small text-white-50">Mechanic</label>
                    <input type="text" name="mechanic" class="form-control bg-dark text-white border-secondary">
                    <div class="hint">Who usually installs / uses this</div>
                </div>
            </div>

            <!-- ================= ACTIONS ================= -->
            <div class="d-flex justify-content-end mt-4 gap-2">
                <a href="{{ url_for('transaction.create_order_page') if return_to == 'po' else url_for('transaction.list_orders') }}" class="btn btn-outline-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-check-circle"></i> Save Item
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}

{% block scripts %}
<script>
    const costInput = document.getElementById('cost_input');
    const sellingInput = document.getElementById('selling_input');
    const markupDisplay = document.getElementById('markup_display');
    const markupHidden = document.getElementById('markup_input');
    const categorySelect = document.getElementById('categorySelect');
    const newCategoryInput = document.getElementById('newCategoryInput');

    // ── Category toggle ──────────────────────────────────────────
    function syncCategoryFields() {
        if (categorySelect.value === "__OTHER__") {
            newCategoryInput.disabled = false;
            newCategoryInput.required = true;
            newCategoryInput.placeholder = "Type new category name...";
            newCategoryInput.focus();
        } else {
            newCategoryInput.value = "";
            newCategoryInput.disabled = true;
            newCategoryInput.required = false;
            newCategoryInput.placeholder = "Select '-- New Category --' to type";
        }
    }

    categorySelect.addEventListener('change', syncCategoryFields);

    // ── Markup calculator ────────────────────────────────────────
    function calculateMarkup() {
        const cost = parseFloat(costInput.value);
        const selling = parseFloat(sellingInput.value);

        if (cost > 0 && selling > 0) {
            const decimalMarkup = (selling - cost) / cost;
            const percentMarkup = decimalMarkup * 100;
            markupDisplay.value = percentMarkup.toFixed(2) + "%";
            markupHidden.value = decimalMarkup.toFixed(4);
        } else {
            markupDisplay.value = '';
            markupHidden.value = '';
        }
    }

    costInput.addEventListener('input', calculateMarkup);
    sellingInput.addEventListener('input', calculateMarkup);

    // ── Form validation with scroll-to-error ─────────────────────
    const form = document.querySelector('form');

    // Map: field name → section title text to scroll to
    const fieldSectionMap = {
        'name':              'Item Information',
        'existing_category': 'Item Information',
        'new_category':      'Item Information',
        'vendor_price':      'Pricing & Cost',
        'cost_per_piece':    'Pricing & Cost',
        'a4s_selling_price': 'Pricing & Cost',
    };

    function getSectionTitle(labelText) {
        return [...document.querySelectorAll('.section-title')]
            .find(el => el.textContent.trim().toUpperCase() === labelText.toUpperCase());
    }

    function showInlineError(input, message) {
        // Remove any existing error for this field
        const existing = input.parentElement.querySelector('.field-error');
        if (existing) existing.remove();

        const err = document.createElement('div');
        err.className = 'field-error';
        err.style.cssText = 'color: #e63946; font-size: 0.75rem; margin-top: 4px;';
        err.textContent = message;
        input.parentElement.appendChild(err);
        input.classList.add('border-danger');
    }

    function clearErrors() {
        document.querySelectorAll('.field-error').forEach(el => el.remove());
        document.querySelectorAll('.border-danger').forEach(el => {
            el.classList.remove('border-danger');
        });
    }

    form.addEventListener('submit', function (e) {
        clearErrors();

        const checks = [
            { el: form.querySelector('[name="name"]'),              label: 'Item name is required.' },
            { el: categorySelect,                                    label: 'Please select a category.' },
            { el: form.querySelector('[name="new_category"]'),       label: 'Please type a new category name.', onlyIfEnabled: true },
            { el: form.querySelector('[name="vendor_price"]'),       label: 'Vendor price is required.' },
            { el: form.querySelector('[name="cost_per_piece"]'),     label: 'Cost per piece is required.' },
            { el: form.querySelector('[name="a4s_selling_price"]'),  label: 'Selling price is required.' },
        ];

        let firstErrorSection = null;
        let firstErrorEl = null;

        for (const check of checks) {
            if (!check.el) continue;
            if (check.onlyIfEnabled && check.el.disabled) continue;

            const isEmpty = check.el.value.trim() === '' || check.el.value === '';

            // Special case: select with placeholder value
            const isSelectEmpty = check.el.tagName === 'SELECT' && check.el.value === '';

            if (isEmpty || isSelectEmpty) {
                showInlineError(check.el, check.label);

                if (!firstErrorEl) {
                    firstErrorEl = check.el;
                    const sectionLabel = fieldSectionMap[check.el.name];
                    firstErrorSection = sectionLabel ? getSectionTitle(sectionLabel) : null;
                }
            }
        }

        if (firstErrorEl) {
            e.preventDefault();
            const target = firstErrorSection || firstErrorEl;
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    });

    // Clear error styling when user interacts with the field
    form.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', () => {
            el.classList.remove('border-danger');
            const err = el.parentElement.querySelector('.field-error');
            if (err) err.remove();
        });
        el.addEventListener('change', () => {
            el.classList.remove('border-danger');
            const err = el.parentElement.querySelector('.field-error');
            if (err) err.remove();
        });
    });
</script>
{% endblock %}
